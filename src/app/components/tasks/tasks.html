<div class="tasksList">
    @if (tasks().length === 0) {
    <p>Nessun task trovato...</p>
    } @else {
    @for (task of tasks(); track task.id) {
    <div class="task">
        <h3>{{ task.text }}</h3>
        <p>{{ task.day }}</p>
        <mat-icon class="close" (click)="onClickDelete(task)">close</mat-icon>
    </div>
    }
    }
</div>
